<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Canvas - AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Container -->
    <div class="main-container">
        <!-- Upload Cards Stack -->
        <div class="upload-cards-stack" id="uploadCardsStack">
            <!-- Initial Upload Card -->
            <div class="upload-card" id="card-1">
                <div class="card-header">
                    <h2 class="card-title">Rate my designs</h2>
                </div>
                <div class="upload-content-container">
                    <div class="upload-zone" id="uploadZone-1">
                        <input type="file" id="imageUpload-1" accept="image/*" multiple class="hidden">
                        <div class="upload-content" id="uploadContent-1">
                            <div class="plus-icon">+</div>
                        </div>
                        <div class="images-grid hidden" id="imagesGrid-1"></div>
                    </div>
                    <div class="results-container hidden" id="resultsContainer-1">
                        <div class="results-content" id="resultsContent-1">
                            <div class="placeholder-text">Upload a design to get AI feedback</div>
                        </div>
                    </div>
                </div>
                <div class="analyze-button-container hidden" id="analyzeButtonContainer-1">
                    <button class="analyze-btn" id="analyzeBtn-1">Analyze</button>
                </div>
            </div>
        </div>

        <!-- Right Card - Feedback -->
        <div class="feedback-card" id="feedbackCard">
            <div class="card-header">
                <h2 class="card-title">Rating...</h2>
            </div>
            <div class="feedback-content" id="feedbackContent">
                <div class="placeholder-text">Upload a design to get AI feedback</div>
            </div>
        </div>
    </div>
    
    <!-- Floating Chat Input -->
    <div class="floating-chat">
        <input type="text" id="chatInput" placeholder="Ask something..." />
        <button id="sendBtn" class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
        </button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
