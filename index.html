<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Canvas - AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Card - Upload -->
        <div class="upload-card">
            <div class="card-header">
                <h2 class="card-title">Rate my designs</h2>
            </div>
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">
                <div class="upload-content" id="uploadContent">
                    <div class="plus-icon">+</div>
                    <p class="upload-text">Drop your images here</p>
                </div>
                <div class="images-grid hidden" id="imagesGrid"></div>
            </div>
        </div>

        <!-- Right Card - Feedback -->
        <div class="feedback-card" id="feedbackCard">
            <div class="card-header">
                <h2 class="card-title">Rating...</h2>
            </div>
            <div class="feedback-content" id="feedbackContent">
                <div class="placeholder-text">Upload a design to get AI feedback</div>
            </div>
        </div>
    </div>
    
    <!-- Floating Chat Input -->
    <div class="floating-chat">
        <input type="text" id="chatInput" placeholder="Ask something..." />
        <button id="sendBtn" class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
        </button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
