<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Canvas - AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas Container -->
    <div class="canvas-container" id="canvasContainer">
        <!-- Canvas Content - This gets transformed -->
        <div class="canvas-content">
            <!-- Design Container -->
            <div class="design-container" id="designContainer">
                <div class="container-header">
                    <h2 class="container-title">Rate my designs</h2>
                </div>
                <div class="design-drop-zone" id="designDropZone">
                    <input type="file" id="imageUpload" accept="image/*" class="hidden">
                    <div class="drop-zone-content">
                        <div class="plus-icon">+</div>
                    </div>
                </div>
            </div>
            
            <!-- Generated Designs Container (Hidden initially) -->
            <div class="generated-designs-container hidden" id="generatedDesignsContainer">
                <div class="generated-header">
                    <h3>Generated Designs</h3>
                </div>
                <div class="generated-designs" id="generatedDesigns"></div>
            </div>
        </div>
    </div>
    
    <!-- Chat Interface - Outside canvas container -->
    <div class="chat-interface">
        <!-- Chat Messages (Expandable) -->
        <div class="chat-messages" id="chatMessages"></div>
        
        <!-- Chat Input -->
        <div class="chat-input-container">
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Ask something ..." />
                <button id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13"></path>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
