<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Canvas - AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Infinite Canvas -->
    <div class="canvas" id="canvas">
        <!-- Upload Box - Centered -->
        <div class="upload-box" id="uploadBox">
            <div class="upload-content">
                <div class="plus-icon">+</div>
                <p class="upload-text">Drop your image here</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div>
    </div>
    
    <!-- Floating Textbox -->
    <div class="floating-textbox" id="floatingTextbox">
        <input type="text" id="textInput" placeholder="Ask something ..." />
        <button id="sendButton" class="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
        </button>
    </div>
    
    <script src="script.js"></script>
    <script>
        // Simple test to see if elements are visible
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded, checking elements...');
            const canvas = document.getElementById('canvas');
            const uploadBox = document.getElementById('uploadBox');
            const textbox = document.getElementById('floatingTextbox');
            
            console.log('Canvas:', canvas);
            console.log('Upload box:', uploadBox);
            console.log('Textbox:', textbox);
            
            if (canvas) {
                canvas.style.border = '2px solid red';
                console.log('Canvas found and styled');
            }
            if (uploadBox) {
                uploadBox.style.border = '2px solid blue';
                console.log('Upload box found and styled');
            }
            if (textbox) {
                textbox.style.border = '2px solid green';
                console.log('Textbox found and styled');
            }
        });
    </script>
</body>
</html>
